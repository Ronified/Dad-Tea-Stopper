<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tea Tracker — Papa Special</title>
  <style>
    :root{
      --bg:#0f1724; --card:#0b1220; --accent:#22c55e; --muted:#94a3b8;
      --danger:#ef4444; --glass: rgba(255,255,255,0.04);
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; background:
      linear-gradient(180deg,#071025 0%, #071425 60%);
      color:#e6eef8; display:flex; align-items:center; justify-content:center;
      padding:20px;
    }
    .app{
      width:100%; max-width:880px; background:linear-gradient(180deg,var(--card), #071025);
      border-radius:14px; padding:20px; box-shadow:0 10px 30px rgba(2,6,23,0.6);
      border:1px solid rgba(255,255,255,0.03);
    }
    header{display:flex; gap:16px; align-items:center; margin-bottom:14px}
    .logo{
      width:56px; height:56px; border-radius:12px; background:var(--glass);
      display:grid; place-items:center; font-weight:700; font-size:20px; color:var(--accent)
    }
    h1{margin:0;font-size:20px}
    p.lead{margin:0;color:var(--muted);font-size:13px}
    .row{display:flex; gap:12px; margin-top:14px; flex-wrap:wrap}
    .card{background:rgba(255,255,255,0.02); padding:14px; border-radius:10px; flex:1; min-width:220px}
    label{display:block;font-size:13px;color:var(--muted); margin-bottom:8px}
    input[type=number]{width:100%; padding:10px 12px; border-radius:8px; border:none; outline:none;
      background:rgba(255,255,255,0.02); color:inherit; font-size:16px}
    button{cursor:pointer; padding:10px 12px; border-radius:8px; border:none; font-weight:600}
    .btn-primary{background:linear-gradient(90deg,#06b6d4,#3b82f6); color:#04111a}
    .btn-plain{background:transparent; color:var(--muted); border:1px solid rgba(255,255,255,0.03)}
    .status{margin-top:10px; padding:10px; border-radius:8px; font-weight:700}
    .status.good{background:rgba(34,197,94,0.12); color:var(--accent)}
    .status.bad{background:rgba(239,68,68,0.12); color:var(--danger)}
    table{width:100%; border-collapse:collapse; margin-top:12px; font-size:14px}
    th,td{padding:8px 6px; text-align:left; border-bottom:1px dashed rgba(255,255,255,0.03); color:var(--muted)}
    th{color:#a8d2ff; font-weight:600}
    .actions{display:flex; gap:8px; align-items:center}
    .small{font-size:12px; color:var(--muted)}
    .hint{font-size:12px; color:var(--muted); margin-top:8px}
    input[type=file]{display:none}
    .toast{position:fixed; right:20px; bottom:20px; background:#0b1220; border:1px solid rgba(255,255,255,0.03);
      padding:10px 14px; border-radius:10px; box-shadow:0 6px 18px rgba(2,6,23,0.6); color:var(--muted)}
    @media (max-width:640px){ .row{flex-direction:column} .card{min-width:unset} }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="logo">☕</div>
      <div>
        <h1>Tea Tracker — Papa Special 💚</h1>
        <p class="lead">Roz likho kitni chai pi. Kam hui toh tareef milegi, zyada hui toh daant 😂</p>
      </div>
    </header>

    <section class="row">
      <div class="card" style="flex:0.9">
        <label for="cups">Aaj kitni chai pi, papa? 😄</label>
        <input id="cups" type="number" min="0" placeholder="e.g. 4" />
        <div style="display:flex; gap:10px; margin-top:10px; align-items:center">
          <button id="saveBtn" class="btn-primary">Save Today</button>
          <button id="undoBtn" class="btn-plain">Undo Last</button>
          <div style="margin-left:auto" class="small" id="lastSaved">No entries yet</div>
        </div>
        <div id="statusArea" class="hint"></div>
        <div id="messageBox" style="margin-top:12px"></div>
      </div>

      <div class="card" style="flex:0.9">
        <div style="display:flex; gap:8px; align-items:center; justify-content:space-between">
          <div>
            <label>History</label>
            <div class="small">Kisi din ko edit karne ke liye uspe tap karo.</div>
          </div>
          <div class="actions">
            <button id="exportBtn" class="btn-plain">Export JSON</button>
            <label for="importFile" class="btn-plain" style="cursor:pointer">Import</label>
            <input id="importFile" type="file" accept="application/json" />
          </div>
        </div>

        <div id="historyWrap" style="margin-top:10px; overflow:auto; max-height:300px">
          <table id="historyTable">
            <thead><tr><th>Date</th><th>Cups</th><th>Note</th><th></th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <footer style="margin-top:12px; display:flex; gap:8px; align-items:center; justify-content:space-between">
      <div class="small">Made with ❤️ by Mihir — Papa ke liye</div>
      <div class="small">v1 • lightweight</div>
    </footer>
  </main>

  <div id="toast" class="toast" style="display:none"></div>

  <script>
    // --- Hinglish messages ---
    const PRAISES = [
      "🔥 Bahut badiya papa! Proud of u 👏",
      "💪 Sahi jaa rahe ho papa, proud moment!",
      "😎 Kya baat hai papa, aaj kam chai — masttt!",
      "👏 Wah papa! Control level expert ho rahe ho!",
      "🚀 Chalo papa, yahi speed rakho, awesome kaam!"
    ];
    const ROASTS = [
      "☕ Kya papa... kam karna tha, badha diye 😭",
      "💀 Papa kyuu peete ho itni chai, kam karo zara!",
      "😅 Oyy papa... chai factory kholni hai kya?",
      "🍵 Papa fir se zyada chai? Control karo boss!",
      "🥲 Arre papa, kal kam tha, aaj zyada kyu 😭"
    ];
    const NEUTRAL = "📌 Pehla din hai papa, abhi compare nahi kar rahe 🙂";

    const KEY = "tea_tracker_log_v1";
    function loadLog(){
      try{
        const raw = localStorage.getItem(KEY);
        return raw ? JSON.parse(raw) : [];
      }catch(e){return [];}
    }
    function saveLog(log){ localStorage.setItem(KEY, JSON.stringify(log)); }

    function isoDate(d){
      const dt = (typeof d==="string")? new Date(d):d;
      const y=dt.getFullYear(), m=String(dt.getMonth()+1).padStart(2,"0"), day=String(dt.getDate()).padStart(2,"0");
      return `${y}-${m}-${day}`;
    }

    const cupsInput=document.getElementById("cups");
    const saveBtn=document.getElementById("saveBtn");
    const undoBtn=document.getElementById("undoBtn");
    const historyTable=document.querySelector("#historyTable tbody");
    const statusArea=document.getElementById("statusArea");
    const lastSaved=document.getElementById("lastSaved");
    const exportBtn=document.getElementById("exportBtn");
    const importFile=document.getElementById("importFile");
    const toast=document.getElementById("toast");

    function showToast(txt,ms=2200){
      toast.textContent=txt;toast.style.display="block";
      clearTimeout(toast._t);toast._t=setTimeout(()=>toast.style.display="none",ms);
    }

    function renderHistory(){
      const log=loadLog().slice().sort((a,b)=>b.date.localeCompare(a.date));
      historyTable.innerHTML="";
      if(!log.length){
        historyTable.innerHTML=`<tr><td colspan="4" style="color:var(--muted)">Koi entry nahi hai abhi</td></tr>`;
        lastSaved.textContent="No entries yet"; return;
      }
      log.forEach(e=>{
        const tr=document.createElement("tr");
        tr.innerHTML=`<td>${e.date}</td><td>${e.cups}</td><td>${e.note||""}</td><td><button class="btn-plain small" data-date="${e.date}" style="padding:5px 8px">Edit</button></td>`;
        tr.querySelector("button").addEventListener("click",()=>editEntry(e.date));
        historyTable.appendChild(tr);
      });
      lastSaved.textContent=`Last: ${log[0].date} — ${log[0].cups} cups`;
    }

    function addOrUpdateEntry(dateStr,cups,note=""){
      const log=loadLog(); const idx=log.findIndex(e=>e.date===dateStr);
      const entry={date:dateStr,cups:Number(cups),note};
      if(idx>=0) log[idx]=entry; else log.push(entry);
      log.sort((a,b)=>a.date.localeCompare(b.date));
      saveLog(log); renderHistory();
    }

    function removeLastEntry(){
      const log=loadLog(); if(!log.length) return false;
      log.sort((a,b)=>b.date.localeCompare(a.date)); const rem=log.shift();
      saveLog(log); renderHistory(); return rem;
    }

    function getYesterday(today){
      const log=loadLog().slice().sort((a,b)=>a.date.localeCompare(b.date));
      for(let i=log.length-1;i>=0;i--){ if(log[i].date<today) return log[i]; }
      return null;
    }

    function editEntry(date){
      const e=loadLog().find(x=>x.date===date); if(!e) return;
      const newC=prompt(`Edit cups for ${date}:`,e.cups); if(newC===null)return;
      const note=prompt("Add a note (optional):",e.note||"");
      addOrUpdateEntry(date,Number(newC),note||""); showToast("Edited successfully");
    }

    saveBtn.addEventListener("click",()=>{
      const val=cupsInput.value.trim(); if(val===""||isNaN(Number(val))||Number(val)<0){alert("Enter valid number");return;}
      const today=isoDate(new Date()); const todayNum=Number(val);
      const yesterday=getYesterday(today);
      addOrUpdateEntry(today,todayNum,"");
      if(!yesterday){ statusArea.innerHTML=`<div class="status" style="color:var(--muted)">${NEUTRAL}</div>`; }
      else{
        if(todayNum<yesterday.cups){
          const msg=PRAISES[Math.floor(Math.random()*PRAISES.length)];
          statusArea.innerHTML=`<div class="status good">${msg} (kal: ${yesterday.cups})</div>`;
        } else if(todayNum>yesterday.cups){
          const msg=ROASTS[Math.floor(Math.random()*ROASTS.length)];
          statusArea.innerHTML=`<div class="status bad">${msg} (kal: ${yesterday.cups})</div>`;
        } else {
          statusArea.innerHTML=`<div class="status" style="color:var(--muted)">Kal jitni hi chai — next time thoda kam papa 💪</div>`;
        }
      }
      cupsInput.value=""; renderHistory(); showToast("Saved ✅");
    });

    undoBtn.addEventListener("click",()=>{
      if(!confirm("Last entry hata du papa?"))return;
      const r=removeLastEntry(); if(r)showToast(`Removed ${r.date}`); else showToast("Kuch nahi mila");
    });

    exportBtn.addEventListener("click",()=>{
      const data=loadLog(); const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
      const url=URL.createObjectURL(blob); const a=document.createElement("a");
      a.href=url; a.download="tea_log.json"; a.click(); URL.revokeObjectURL(url);
    });

    importFile.addEventListener("change",ev=>{
      const f=ev.target.files[0]; if(!f)return;
      const r=new FileReader(); r.onload=()=>{
        try{
          const imp=JSON.parse(r.result); if(!Array.isArray(imp))throw"bad";
          saveLog(imp); renderHistory(); showToast("Import done ✅");
        }catch(e){alert("Galat file hai papa.");}
      }; r.readAsText(f); ev.target.value="";
    });

    renderHistory();
  </script>
</body>
</html>
